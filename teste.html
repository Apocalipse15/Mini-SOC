<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>WebAuthn Test</title>
</head>

<body>
  <h2>WebAuthn Test</h2>

  <input id="username" placeholder="username" />
  <input id="display" placeholder="display name" />

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>

  <pre id="out"></pre>

<script>
const API = "http://localhost:8000";

function log(msg) {
  document.getElementById("out").textContent += msg + "\n";
}

// base64url helpers
function toBase64Url(buffer) {
  const bytes = new Uint8Array(buffer);
  let str = btoa(String.fromCharCode(...bytes));
  return str.replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}

function fromBase64Url(base64url) {
  base64url = base64url.replace(/-/g, "+").replace(/_/g, "/");
  const pad = base64url.length % 4;
  if (pad) base64url += "=".repeat(4 - pad);
  const str = atob(base64url);
  return Uint8Array.from(str, c => c.charCodeAt(0));
}

async function register() {
  const username = document.getElementById("username").value;
  const display = document.getElementById("display").value;

  const res = await fetch(`${API}/auth/register/begin`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username,
      display_name: display
    })
  });

  const options = await res.json();
  log("Register options received");

  // decode challenge + user id
  options.challenge = fromBase64Url(options.challenge);
  options.user.id = fromBase64Url(options.user.id);

  const cred = await navigator.credentials.create({
    publicKey: options
  });

  log("Credential created");

  const payload = {
    id: cred.id,
    rawId: toBase64Url(cred.rawId),
    type: cred.type,
    response: {
      clientDataJSON: toBase64Url(cred.response.clientDataJSON),
      attestationObject: toBase64Url(cred.response.attestationObject)
    }
  };

  const verify = await fetch(`${API}/auth/register/complete`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      credential: payload,
      username
    })
  });

  const result = await verify.json();
  log("REGISTER COMPLETE:");
  log(JSON.stringify(result, null, 2));
}

async function login() {
  const username = document.getElementById("username").value;

  const res = await fetch(`${API}/auth/authenticate/begin`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username })
  });

  const options = await res.json();
  log("Login options received");

  options.challenge = fromBase64Url(options.challenge);

  if (options.allowCredentials) {
    options.allowCredentials = options.allowCredentials.map(c => ({
      ...c,
      id: fromBase64Url(c.id)
    }));
  }

  const assertion = await navigator.credentials.get({
    publicKey: options
  });

  const payload = {
    id: assertion.id,
    rawId: toBase64Url(assertion.rawId),
    type: assertion.type,
    response: {
      clientDataJSON: toBase64Url(assertion.response.clientDataJSON),
      authenticatorData: toBase64Url(assertion.response.authenticatorData),
      signature: toBase64Url(assertion.response.signature),
      userHandle: assertion.response.userHandle
        ? toBase64Url(assertion.response.userHandle)
        : null
    }
  };

  const verify = await fetch(`${API}/auth/authenticate/complete`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      credential: payload,
      username
    })
  });

  const result = await verify.json();
  log("LOGIN COMPLETE:");
  log(JSON.stringify(result, null, 2));
}
</script>

</body>
</html>
